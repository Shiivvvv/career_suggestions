<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Guidance - After 12th</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Career Guidance Portal</h1>
            <p>Find the best career options and colleges after 12th based on your stream and percentage</p>
        </header>

        <div class="form-box">
            <form action="result.php" method="POST">
                <label for="stream">Select Your Stream:</label>
                <select id="stream" name="stream" required>
                    <option value="">-- Choose Stream --</option>
                    <option value="Science_PCM">Science (PCM - Physics, Chemistry, Math)</option>
                    <option value="Science_PCB">Science (PCB - Physics, Chemistry, Biology)</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Arts">Arts / Humanities</option>
                </select>

                <label for="percentage">Enter Your 12th Percentage:</label>
                <input type="number" id="percentage" name="percentage" min="0" max="100" placeholder="e.g. 78" required>

                <button type="submit">Get Career Suggestions</button>
            </form>
        </div>

        <footer>
            <p>&copy; 2025 Career Guidance Portal. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
