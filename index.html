<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Guidance - After 12th</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <div class="container">
        <header>
            <h1>Career Guidance Portal</h1>
            <p>Discover your perfect career path after 12th based on your stream and performance</p>
        </header>

        <div class="form-box">
            <form action="result.html" method="GET">
                <label for="stream">Select Your Stream</label>
                <select id="stream" name="stream" required>
                    <option value="">-- Choose Your Stream --</option>
                    <option value="Science_PCM">Science (PCM - Physics, Chemistry, Math)</option>
                    <option value="Science_PCB">Science (PCB - Physics, Chemistry, Biology)</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Arts">Arts / Humanities</option>
                </select>

                <label for="percentage">Enter Your 12th Percentage</label>
                <input type="number" id="percentage" name="percentage" min="0" max="100" step="0.01" placeholder="e.g. 78.50" required>

                <button type="submit">✨ Get Career Suggestions</button>
            </form>
        </div>

        <footer>
            <p> Made with 💜 for Students | Find Your Path</p>
        </footer>
    </div>
</body>
</html>
